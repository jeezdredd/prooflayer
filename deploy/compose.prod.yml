# Production docker-compose for ProofLayer on homelab Ubuntu server.
# Differences vs root docker-compose.yml:
#  - No published ports for db/redis/minio (private to compose network)
#  - Backend runs gunicorn, not Django dev server
#  - settings.prod
#  - Frontend served as built static via nginx (Dockerfile target=prod)
#  - Ollama uses ROCm image (RX 6700S GPU)
#  - Restart policy unless-stopped
#  - Caddy sits outside compose on host, reverse-proxies to 127.0.0.1:<host_port>

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: prooflayer
      POSTGRES_USER: prooflayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prooflayer"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        python manage.py migrate --noinput && \
        python manage.py collectstatic --noinput && \
        python manage.py seed_analyzers && \
        exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class gthread --threads 2 --timeout 120 --access-logfile - --error-logfile -
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://prooflayer:${POSTGRES_PASSWORD}@db:5432/prooflayer
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SECURE_SSL_REDIRECT=false
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-qwen2.5vl:7b}
      - HF_TOKEN=${HF_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-prooflayer-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_CUSTOM_DOMAIN=${AWS_S3_CUSTOM_DOMAIN:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-ProofLayer <noreply@prooflayer.cloud>}
      - FRONTEND_URL=${FRONTEND_URL:-https://prooflayer.cloud}
      - REFRESH_COOKIE_DOMAIN=${REFRESH_COOKIE_DOMAIN:-}
      - REFRESH_COOKIE_SECURE=${REFRESH_COOKIE_SECURE:-true}
      - REFRESH_COOKIE_SAMESITE=${REFRESH_COOKIE_SAMESITE:-Lax}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: >
      celery -A config.celery worker
      --beat
      --schedule=/tmp/celerybeat-schedule
      --loglevel=info
      -Q default,ml,reports
      --concurrency=2
      --max-tasks-per-child=8
      --max-memory-per-child=10000000
    volumes:
      - media_data:/app/media
      - hf_cache:/root/.cache/huggingface
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://prooflayer:${POSTGRES_PASSWORD}@db:5432/prooflayer
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-qwen2.5vl:7b}
      - HF_TOKEN=${HF_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-prooflayer-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_CUSTOM_DOMAIN=${AWS_S3_CUSTOM_DOMAIN:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-ProofLayer <noreply@prooflayer.cloud>}
      - FRONTEND_URL=${FRONTEND_URL:-https://prooflayer.cloud}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - OMP_NUM_THREADS=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A config.celery flower --port=5555 --url_prefix=flower
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${AWS_STORAGE_BUCKET_NAME:-prooflayer-media} || true &&
      mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME:-prooflayer-media} || true
      "

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama}
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama_init:
    image: ${OLLAMA_IMAGE:-ollama/ollama}
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - "ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && ollama pull ${OLLAMA_VISION_MODEL:-qwen2.5vl:7b}"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.prooflayer.cloud/api/v1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
  media_data:
  static_data:
  ollama_data:
  minio_data:
  hf_cache:
