[phases.setup]
nixPkgs = ["libmagic", "ffmpeg", "libsndfile", "libjpeg", "zlib", "pango", "cairo", "glib"]

[phases.install]
cmds = ["uv sync --locked --no-dev --no-editable"]

[start]
cmd = "cd backend && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
